# Fly.io app config — run `fly launch` / `fly deploy` from repo root or apps/api.
# Region: bom (Mumbai) per Plans/00-MASTER-PLAN.md

app = "sonari-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
