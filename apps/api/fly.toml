# Fly.io app config — run `fly launch` / `fly deploy` from repo root or apps/api.
# Region: sin (Singapore) per ADR-009 — bom (Mumbai) has no VM capacity as of 2026-07-05.

app = "sonari-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
