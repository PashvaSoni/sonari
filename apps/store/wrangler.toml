# Cloudflare Workers Static Assets (SPA)
# Custom domain: app.sonari.shop (ADR-008)
# Zone sonari.shop must be Active on this Cloudflare account.
name = "sonari-store"
compatibility_date = "2025-07-04"
workers_dev = false

[[routes]]
pattern = "app.sonari.shop"
custom_domain = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
